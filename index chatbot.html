<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Health Buddy</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:linear-gradient(135deg,#0f172a,#111827,#1e3a8a);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:15px;
}

.chat-container{
width:430px;
max-width:100%;
height:720px;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(18px);
border-radius:24px;
overflow:hidden;
box-shadow:0 20px 50px rgba(0,0,0,0.35);
display:flex;
flex-direction:column;
}

.header{
background:rgba(255,255,255,0.10);
padding:18px 16px 14px;
text-align:center;
position:relative;
}

.header h1{
font-size:22px;
color:darkblue;
display:block;
line-height:1.2;
padding-right:120px;
padding-left:120px;
white-space:nowrap;
overflow:hidden;
text-overflow:ellipsis;
}

.sub{
font-size:14px;
color:blue;
margin-top:6px;
display:block;
white-space:normal;
line-height:1.3;
padding:0 80px;
}

.top-buttons{
position:absolute;
top:14px;
right:12px;
display:flex;
gap:8px;
}

.top-buttons button{
width:34px;
height:34px;
border:none;
border-radius:10px;
cursor:pointer;
font-size:16px;
background:white;
}

.chat-box{
flex:1;
overflow-y:auto;
padding:14px;
}

.row{
display:flex;
align-items:flex-end;
gap:10px;
margin:12px 0;
}

.row.user-row{
justify-content:flex-end;
}

.avatar{
width:38px;
height:38px;
border-radius:50%;
background:white;
display:flex;
align-items:center;
justify-content:center;
font-size:20px;
flex-shrink:0;
}

.message{
padding:12px 14px;
border-radius:16px;
max-width:270px;
font-size:15px;
line-height:1.5;
word-wrap:break-word;
}

.bot{
background:white;
color:#111;
border-bottom-left-radius:5px;
}

.user{
background:#22c55e;
color:white;
border-bottom-right-radius:5px;
}

.reminder{
display:none;
background:#facc15;
padding:10px;
text-align:center;
font-size:14px;
font-weight:bold;
}

.input-area{
display:flex;
gap:10px;
padding:14px;
background:rgba(255,255,255,0.06);
}

input{
flex:1;
padding:12px;
border:none;
outline:none;
border-radius:12px;
font-size:15px;
}

.send-btn{
padding:12px 18px;
border:none;
border-radius:12px;
background:#22c55e;
color:white;
font-weight:bold;
cursor:pointer;
}

.footer{
text-align:center;
font-size:12px;
color:#dbeafe;
padding:8px;
}
</style>
</head>

<body>

<div class="chat-container">

<div class="header">
<h1>💙 Health Buddy</h1>
<div class="sub">Your Smart Health Assistant</div>

<div class="top-buttons">
<button onclick="toggleMode()">🌙</button>
<button onclick="startVoice()">🎤</button>
<button onclick="findHospital()">🏥</button>
</div>
</div>

<div class="reminder" id="reminderBox">
💊 Time to take your medicine!
</div>

<div class="chat-box" id="chatBox"></div>

<div class="input-area">
<input type="text" id="userInput" placeholder="Ask for health advice...">
<button class="send-btn" onclick="sendMessage()">Send</button>
</div>

<div class="footer">
Health advice, solutions & suggestions 💙
</div>

</div>

<script>
const chatBox = document.getElementById("chatBox");

function addBotMessage(text){
chatBox.innerHTML += `
<div class="row">
<div class="avatar">👨‍⚕️</div>
<div class="message bot">${text}</div>
</div>
`;
chatBox.scrollTop = chatBox.scrollHeight;
}

function addUserMessage(text){
chatBox.innerHTML += `
<div class="row user-row">
<div class="message user">${text}</div>
</div>
`;
chatBox.scrollTop = chatBox.scrollHeight;
}

function getReply(input){

input = input.toLowerCase();

if(input.includes("headache")){
return "Drink water, rest, avoid too much screen time, and reduce stress. If pain continues, see a doctor.";
}
else if(input.includes("fever")){
return "Rest, hydrate and monitor your temperature. Seek medical help if fever remains high.";
}
else if(input.includes("cough")){
return "Warm fluids and rest may help. If breathing becomes difficult, visit a clinic.";
}
else if(input.includes("stress")){
return "Try deep breathing, exercise, and proper sleep to lower stress.";
}
else if(input.includes("diet")){
return "Eat fruits, vegetables, protein, and reduce sugar and junk food.";
}
else if(input.includes("sleep")){
return "Aim for 7 to 9 hours of sleep and avoid phone screens before bed.";
}
else if(input.includes("stomach")){
return "Eat light foods, drink water and avoid oily meals. Severe pain needs medical attention.";
}
else{
return "I can help with headaches, fever, stress, diet, sleep, fitness and wellness suggestions.";
}
}

function sendMessage(){

let input = document.getElementById("userInput");
let text = input.value.trim();

if(text==="") return;

addUserMessage(text);

setTimeout(()=>{
addBotMessage(getReply(text));
},500);

input.value="";
}

function toggleMode(){

if(document.body.classList.contains("light")){
document.body.classList.remove("light");
document.body.style.background =
"linear-gradient(135deg,#0f172a,#111827,#1e3a8a)";
}
else{
document.body.classList.add("light");
document.body.style.background =
"linear-gradient(135deg,#dbeafe,#ffffff,#bfdbfe)";
}

}

function startVoice(){

const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

if(!SpeechRecognition){
alert("Voice not supported.");
return;
}

const recognition = new SpeechRecognition();
recognition.start();

recognition.onresult = function(event){
document.getElementById("userInput").value = event.results[0][0].transcript;
sendMessage();
}
}

function findHospital(){
if(navigator.geolocation){
navigator.geolocation.getCurrentPosition(function(pos){
window.open(`https://www.google.com/maps/search/hospital/@${pos.coords.latitude},${pos.coords.longitude},15z`);
});
}
}

function medicineReminder(){
document.getElementById("reminderBox").style.display="block";
setTimeout(()=>{
document.getElementById("reminderBox").style.display="none";
},4000);
}

setInterval(medicineReminder,60000);

window.onload = function(){
addBotMessage("Hello! I am Health Buddy. Ask me for health advice, solutions or wellness suggestions.");
}
</script>

</body>
</html>
